services:
  postgres:
    image: postgres:17
    container_name: students-postgres
    environment:
      POSTGRES_DB: students_db
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - students_postgres_data:/var/lib/postgresql/data

volumes:
  students_postgres_data: